<!DOCTYPE html>
<html>
<head>
    <title>Monster Stock Scanner</title>
    <meta charset="UTF-8">
    <style>
        body { background: #0a0a0a; color: #0f0; font-family: monospace; padding: 20px; }
        pre { background: #111; padding: 15px; overflow-x: auto; border-radius: 8px; }
        .status { margin-bottom: 15px; }
        .error { color: #f66; }
    </style>
</head>
<body>
    <h1>🐉 Monster Stock Scanner</h1>
    <div class="status" id="status">Loading data from scanner...</div>
    <pre id="output"></pre>
    <script>
        fetch('/api/scanner')
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    document.getElementById('status').innerHTML = `✅ ${data.count} stocks found | Top ${data.stocks?.length || 0} shown | Updated: ${new Date(data.timestamp).toLocaleTimeString()}`;
                    document.getElementById('output').innerHTML = JSON.stringify(data.stocks, null, 2);
                } else {
                    throw new Error(data.error || 'Unknown error');
                }
            })
            .catch(err => {
                document.getElementById('status').innerHTML = `<span class="error">❌ Error: ${err.message}</span>`;
                document.getElementById('output').innerHTML = '';
            });
    </script>
</body>
</html>
